apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-analytics
  labels:
    app: voyage-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voyage-analytics
  template:
    metadata:
      labels:
        app: voyage-analytics
    spec:
      containers:
      - name: flight-api
        image: voyage-analytics:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: voyage-analytics-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
