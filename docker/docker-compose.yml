version: '3.9'

services:
  flight-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: voyage-flight-api
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
